:root {
  /* Tempoe Brand Colors from Logo */
  --brand-purple: #42207A;
  --brand-purple-light: rgba(66, 32, 122, 0.3);
  --brand-orange: #FF6600;
  --brand-orange-hover: #E65C00;
  --brand-orange-light: rgba(255, 102, 0, 0.15);

  /* Dark Mode UI Palette */
  --bg: #09090B; /* True dark/black */
  --surface: #121217; /* Slightly elevated */
  --surface-2: #1A1A21; /* Cards, inputs */
  --border: rgba(255, 255, 255, 0.08); 
  --border-strong: rgba(255, 255, 255, 0.15);
  
  /* Text Colors */
  --text: #F4F4F5;
  --text-2: #A1A1AA;
  --text-3: #71717A;

  /* Utility Tags */
  --tag-p-bg: rgba(66, 32, 122, 0.4);
  --tag-p-txt: #D4B3FF;
  --tag-o-bg: rgba(255, 102, 0, 0.15);
  --tag-o-txt: #FFB380;
  --tag-b-bg: rgba(56, 189, 248, 0.15);
  --tag-b-txt: #7DD3FC;

  --radius: 12px; --radius-sm: 8px; --radius-pill: 99px;
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.25);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
