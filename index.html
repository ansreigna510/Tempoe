:root {
  /* Brand Colors */
  --brand-purple: #42207A;
  --brand-purple-light: rgba(66, 32, 122, 0.3);
  --brand-orange: #FF6600;
  --brand-orange-hover: #E65C00;
  --brand-orange-light: rgba(255, 102, 0, 0.15);

  /* Deep Dark Mode Palette */
  --bg: #0C0C0E; 
  --surface: #141419; 
  --surface-2: #1E1E26; 
  --surface-3: #2A2A34; 
  --border: rgba(255, 255, 255, 0.08); 
  --border-strong: rgba(255, 255, 255, 0.15);
  
  /* Text */
  --text: #F4F4F5;
  --text-2: #A1A1AA;
  --text-3: #71717A;

  /* Accent Tags */
  --tag-p-bg: rgba(66, 32, 122, 0.4); --tag-p-txt: #D4B3FF;
  --tag-o-bg: rgba(255, 102, 0, 0.15); --tag-o-txt: #FFB380;
  --tag-b-bg: rgba(56, 189, 248, 0.15); --tag-b-txt: #7DD3FC;

  --radius: 12px; --radius-sm: 8px; --radius-pill: 99px;
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* Bulletproof Font Fallbacks */
body { 
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  min-height: 100vh; 
  overflow-x: hidden; 
}

button { font-family: inherit; cursor: pointer; }
input, textarea { font-family: inherit; color: var(--text); }

.shell { display: flex; width: 100%; height: 100vh; max-width: 1500px; margin: 0 auto; position: relative; background: var(--bg); }
